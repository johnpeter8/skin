<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Providence - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 242, 255, 0.08), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(30, 136, 229, 0.08), transparent 50%);
            pointer-events: none;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            width: 420px;
            max-width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-section h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: white;
            margin-bottom: 5px;
        }

        .logo-section h1 span {
            color: #00f2ff;
        }

        .logo-section p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #00f2ff;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00f2ff, #1e88e5);
            border: none;
            border-radius: 12px;
            color: #0f172a;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: rgba(244, 63, 94, 0.15);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: #f43f5e;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        .role-indicator {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .role-indicator p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <h1>LA <span>PROVIDENCE</span></h1>
            <p>HOSPITAL MANAGEMENT SYSTEM</p>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Injiza username..." autocomplete="off">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Injiza password...">
        </div>

        <button class="btn-login" id="loginBtn" onclick="login()">
            INJIRA / LOGIN
        </button>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="role-indicator">
            <p>Admin | Doctor | Reception</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDuNz2dvLH3NgwzQys9__0sTN0L1kbomFY",
            authDomain: "providence-e77b1.firebaseapp.com",
            databaseURL: "https://providence-e77b1-default-rtdb.firebaseio.com",
            projectId: "providence-e77b1",
            storageBucket: "providence-e77b1.firebasestorage.app",
            messagingSenderId: "1042528351641",
            appId: "1:1042528351641:web:2b1b1231e4341ccf73cf08",
            measurementId: "G-NP7QFCTSBK"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Check if already logged in
        const session = JSON.parse(localStorage.getItem('providence_session') || 'null');
        if (session) {
            redirectToRole(session.role);
        }

        function redirectToRole(role) {
            switch(role) {
                case 'admin': window.location.href = 'admin.html'; break;
                case 'doctor': window.location.href = 'doctor.html'; break;
                case 'reception': window.location.href = 'reception.html'; break;
                default: break;
            }
        }

        async function login() {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!username || !password) {
                showError('Nyamuneka injiza username na password!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Kugenzura... <span class="loading"></span>';

            try {
                // Check admin first
                const adminSnap = await db.ref('users/admin').once('value');
                const admin = adminSnap.val();

                if (admin && admin.username === username && admin.password === password) {
                    const session = { 
                        role: 'admin', 
                        username: username, 
                        name: admin.name || 'Admin',
                        loginTime: Date.now() 
                    };
                    localStorage.setItem('providence_session', JSON.stringify(session));
                    showSuccess('Kwinjira byagenze neza! Guhindura urupapuro...');
                    setTimeout(() => window.location.href = 'admin.html', 800);
                    return;
                }

                // Check doctors
                const doctorsSnap = await db.ref('doctors').once('value');
                const doctors = doctorsSnap.val() || {};

                for (const drId in doctors) {
                    const dr = doctors[drId];
                    if (dr.username === username && dr.password === password && dr.active !== false) {
                        const session = { 
                            role: 'doctor', 
                            drId: drId,
                            username: username, 
                            name: dr.name,
                            loginTime: Date.now() 
                        };
                        localStorage.setItem('providence_session', JSON.stringify(session));
                        showSuccess('Kwinjira byagenze neza! Guhindura urupapuro...');
                        setTimeout(() => window.location.href = 'doctor.html', 800);
                        return;
                    }
                }

                // Check reception
                const receptionSnap = await db.ref('users/reception').once('value');
                const reception = receptionSnap.val();

                if (reception && reception.username === username && reception.password === password) {
                    const session = { 
                        role: 'reception', 
                        username: username, 
                        name: reception.name || 'Reception',
                        loginTime: Date.now() 
                    };
                    localStorage.setItem('providence_session', JSON.stringify(session));
                    showSuccess('Kwinjira byagenze neza! Guhindura urupapuro...');
                    setTimeout(() => window.location.href = 'reception.html', 800);
                    return;
                }

                showError('Username cyangwa password siyo! Ongera ugerageze.');

            } catch (err) {
                showError('Ikosa ryabaye: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'INJIRA / LOGIN';
            }
        }

        function showError(msg) {
            const div = document.getElementById('errorMsg');
            div.textContent = msg;
            div.style.display = 'block';
        }

        function showSuccess(msg) {
            const div = document.getElementById('successMsg');
            div.textContent = msg;
            div.style.display = 'block';
        }

        // Enter key support
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
