<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <title>La Providence - Reception Desk</title>
    <style>
        :root {
            --primary: #1e293b; --accent: #38bdf8; --danger: #f43f5e;
            --success: #22c55e; --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif; background: #f8fafc;
            margin: 0; padding: 0; color: #1e293b;
        }

        /* LOGIN OVERLAY */
        .login-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }

        .login-box {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 40px; width: 400px; max-width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .login-box h2 { color: white; text-align: center; margin-bottom: 25px; font-size: 1.8rem; }
        .login-box h2 span { color: var(--accent); }
        .login-box input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; font-size: 1rem; outline: none;
        }
        .login-box input:focus { border-color: var(--accent); }
        .login-box input::placeholder { color: rgba(255,255,255,0.3); }
        .login-box button {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--accent), #1e88e5);
            border: none; border-radius: 12px; color: #0f172a;
            font-size: 1rem; font-weight: 800; cursor: pointer;
        }
        .login-error { color: #f43f5e; text-align: center; margin-top: 10px; font-size: 0.9rem; display: none; }

        /* MAIN APP */
        .app { display: none; }

        .topbar {
            background: var(--primary); color: white; padding: 12px 25px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .topbar .brand { font-weight: 900; letter-spacing: 3px; font-size: 1.2rem; }
        .topbar .brand span { color: var(--accent); }
        .topbar .user-info { display: flex; align-items: center; gap: 15px; font-size: 0.85rem; }
        .topbar .user-info span { background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 8px; }
        .btn-logout {
            background: var(--danger); color: white; border: none;
            padding: 6px 16px; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 0.8rem;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 25px; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.5rem; color: var(--primary); }
        .header p { color: #64748b; margin-top: 5px; }

        .register-card {
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;
        }

        label { display: block; margin-bottom: 8px; font-weight: bold; color: #64748b; font-size: 0.9rem; }
        input, select {
            width: 100%; padding: 15px; border: 2px solid #e2e8f0;
            border-radius: 10px; font-size: 1.1rem; box-sizing: border-box;
            margin-bottom: 15px; outline-color: var(--accent);
        }
        select { cursor: pointer; background: white; }

        .btn-add {
            width: 100%; background: var(--primary); color: white;
            padding: 15px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-add:hover { background: #334155; }
        .btn-add:disabled { background: #94a3b8; cursor: not-allowed; }

        .doctor-tabs {
            background: white; border-radius: 15px; padding: 15px;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; gap: 10px; overflow-x: auto;
        }

        .doctor-tab {
            padding: 12px 24px; border-radius: 8px; cursor: pointer;
            font-weight: 600; white-space: nowrap;
            background: #f1f5f9; color: #64748b; transition: 0.2s;
        }
        .doctor-tab.active {
            background: var(--accent); color: white;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }
        .doctor-tab:hover:not(.active) { background: #e2e8f0; }

        .list-card { 
            background: rgba(232, 241, 248, 0.164); 
            border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .list-header { 
            background: #245e99; padding: 15px; 
            font-weight: bold; font-size: 0.8rem; 
            color: white; display: flex;
            justify-content: space-between; align-items: center;
        }

        .patient-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #f1f5f9;
            background: white;
        }
        .patient-item:nth-child(even) { background: #f8fafc; }
        .patient-info b { color: var(--accent); margin-right: 10px; font-size: 1.1rem; }

        .btn-del {
            background: #fee2e2; color: var(--danger);
            border: none; padding: 8px 15px; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-size: 0.8rem;
        }
        .btn-del:hover { background: var(--danger); color: white; }

        .empty-msg { padding: 40px; text-align: center; color: #94a3b8; }
        .stats-badge { 
            background: rgba(255,255,255,0.2); 
            padding: 4px 12px; border-radius: 8px;
            font-size: 0.9rem;
        }

        .success-toast {
            position: fixed; top: 70px; right: 20px;
            background: var(--success); color: white;
            padding: 15px 25px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: 600; z-index: 1000;
            transform: translateX(150%); transition: transform 0.3s;
        }
        .success-toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <!-- LOGIN OVERLAY -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>RECEPTION <span>LOGIN</span></h2>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="doLogin()">INJIRA</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="app" id="mainApp">
        <div class="topbar">
            <div class="brand">LA <span>PROVIDENCE</span></div>
            <div class="user-info">
                <span>📝 <span id="recName">Reception</span></span>
                <button class="btn-logout" onclick="logout()">SOHOKA</button>
            </div>
        </div>

        <div class="container">
            <div class="header">
                <h1>GUTANGA NUMBER - RECEPTION</h1>
                <p>Injiza izina ry'umurwayi uje ubu n'ugene muganga.</p>
            </div>

            <div class="register-card">
                <label>IZINA RY'UMURWAYI / Patient Name</label>
                <input type="text" id="pName" placeholder="Andika izina hano..." autocomplete="off">

                <label>HITAMO MUGANGA / Select Doctor</label>
                <select id="doctorSelect">
                    <option value="">-- Hitamo Muganga --</option>
                </select>

                <button class="btn-add" onclick="addPatient()" id="addBtn">➕ ANDIKA UMURWAYI / ADD PATIENT</button>
            </div>

            <!-- DOCTOR TABS -->
            <div class="doctor-tabs" id="doctorTabs"></div>

            <div class="list-card">
                <div class="list-header">
                    <span id="listTitle">ABATEGEREJE KWINJIRA</span>
                    <span class="stats-badge" id="countBadge">0</span>
                </div>
                <div id="patientList"></div>
            </div>
        </div>
    </div>

    <div class="success-toast" id="toast">Umurwayi yashyizweho neza!</div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDuNz2dvLH3NgwzQys9__0sTN0L1kbomFY",
            authDomain: "providence-e77b1.firebaseapp.com",
            databaseURL: "https://providence-e77b1-default-rtdb.firebaseio.com",
            projectId: "providence-e77b1",
            storageBucket: "providence-e77b1.firebasestorage.app",
            messagingSenderId: "1042528351641",
            appId: "1:1042528351641:web:2b1b1231e4341ccf73cf08",
            measurementId: "G-NP7QFCTSBK"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let doctors = {};
        let currentViewDoctor = null;

        // ========== AUTH ==========
        function checkAuth() {
            const session = JSON.parse(localStorage.getItem('providence_session') || 'null');
            if (!session || session.role !== 'reception') {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
                return false;
            }
            document.getElementById('recName').textContent = session.name || 'Reception';
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            return true;
        }

        async function doLogin() {
            const user = document.getElementById('loginUser').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value;
            const errorDiv = document.getElementById('loginError');

            if (!user || !pass) {
                errorDiv.textContent = 'Injiza username na password!';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const snap = await db.ref('users/reception').once('value');
                const rec = snap.val();

                if (rec && rec.username === user && rec.password === pass) {
                    const session = { 
                        role: 'reception', 
                        username: user, 
                        name: rec.name || 'Reception',
                        loginTime: Date.now() 
                    };
                    localStorage.setItem('providence_session', JSON.stringify(session));
                    checkAuth();
                    loadDoctors();
                } else {
                    errorDiv.textContent = 'Username cyangwa password siyo!';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Ikosa: ' + err.message;
                errorDiv.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('providence_session');
            window.location.reload();
        }

        // ========== DOCTORS ==========
        function loadDoctors() {
            if (!checkAuth()) return;

            db.ref('doctors').on('value', (snapshot) => {
                doctors = snapshot.val() || {};
                const select = document.getElementById('doctorSelect');
                const tabs = document.getElementById('doctorTabs');

                select.innerHTML = '<option value="">-- Hitamo Muganga --</option>';
                tabs.innerHTML = '';

                Object.keys(doctors).forEach(drId => {
                    const dr = doctors[drId];
                    if (dr.active) {
                        const option = document.createElement('option');
                        option.value = drId;
                        option.textContent = dr.name;
                        select.appendChild(option);

                        const tab = document.createElement('div');
                        tab.className = 'doctor-tab';
                        tab.textContent = dr.name;
                        tab.onclick = () => switchDoctor(drId);
                        tabs.appendChild(tab);
                    }
                });

                if (!currentViewDoctor && Object.keys(doctors).length > 0) {
                    const firstDr = Object.keys(doctors).find(id => doctors[id].active);
                    if (firstDr) switchDoctor(firstDr);
                }
            });
        }

        function switchDoctor(drId) {
            currentViewDoctor = drId;
            document.querySelectorAll('.doctor-tab').forEach((tab, i) => {
                const drIds = Object.keys(doctors).filter(id => doctors[id].active);
                tab.classList.toggle('active', drIds[i] === drId);
            });
            document.getElementById('listTitle').textContent = `${doctors[drId].name} - ABATEGEREJE`;
            updatePatientList();
        }

        function addPatient() {
            const nameInput = document.getElementById('pName');
            const drSelect = document.getElementById('doctorSelect');
            const name = nameInput.value.trim();
            const drId = drSelect.value;

            if (!name) { alert("Nyamuneka andika izina!"); return; }
            if (!drId) { alert("Nyamuneka hitamo muganga!"); return; }

            db.ref('settings/counter').once('value').then(cSnap => {
                const counter = cSnap.val() || 1;
                db.ref(`doctors/${drId}/queue/p`).once('value').then(qSnap => {
                    let pending = qSnap.val() || [];
                    const newPatient = {
                        id: "A-" + String(counter).padStart(3, '0'),
                        name: name,
                        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                    };
                    pending.push(newPatient);
                    db.ref(`doctors/${drId}/queue/p`).set(pending);
                    db.ref('settings/counter').set(counter + 1);
                    nameInput.value = "";
                    nameInput.focus();
                    showToast(`${newPatient.id} - ${name} yashyizweho!`);
                });
            });
        }

        function deletePatient(drId, patientId) {
            if (confirm("Ushaka gusiba uyu murwayi mu rutonde?")) {
                db.ref(`doctors/${drId}/queue/p`).once('value').then(snap => {
                    let pending = snap.val() || [];
                    pending = pending.filter(p => p.id !== patientId);
                    db.ref(`doctors/${drId}/queue/p`).set(pending);
                });
            }
        }

        function updatePatientList() {
            if (!currentViewDoctor || !doctors[currentViewDoctor]) return;

            db.ref(`doctors/${currentViewDoctor}/queue/p`).on('value', (snapshot) => {
                const pending = snapshot.val() || [];
                const listDiv = document.getElementById('patientList');
                const badge = document.getElementById('countBadge');

                badge.textContent = pending.length;

                if (pending.length === 0) {
                    listDiv.innerHTML = `<div class="empty-msg">Nta murwayi uri ku murongo.</div>`;
                    return;
                }

                listDiv.innerHTML = pending.map(p => `
                    <div class="patient-item">
                        <div class="patient-info">
                            <b>${p.id}</b> <span>${p.name}</span>
                            <small style="color: #94a3b8; margin-left: 10px;">${p.time || ''}</small>
                        </div>
                        <button class="btn-del" onclick="deletePatient('${currentViewDoctor}', '${p.id}')">SIBA</button>
                    </div>
                `).join('');
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========== INIT ==========
        if (checkAuth()) {
            loadDoctors();
        }
    </script>
</body>
</html>
